name: flutter_application_1
description: "TakaTrack — Premium Personal Finance & Wealth Management for Bangladesh"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.0.2

  # Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # Local Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2

  # Charts
  fl_chart: ^0.68.0

  # Animations
  flutter_animate: ^4.5.0

  # Biometric Auth
  local_auth: ^2.3.0

  # Notifications
  flutter_local_notifications: ^17.2.1+2

  # PDF & Export
  pdf: ^3.11.1
  printing: ^5.13.1
  csv: ^6.0.0

  # Utils
  intl: ^0.19.0
  path_provider: ^2.1.4
  uuid: ^4.4.2
  collection: ^1.18.0
  hugeicons: ^1.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true
